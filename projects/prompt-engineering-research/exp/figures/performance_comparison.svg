<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="500" fill="#f8f9fa"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">CAPE Framework Performance Comparison</text>
  <text x="400" y="50" text-anchor="middle" font-size="12" fill="#666">Pass@1 and Quality/Cost Ratio Across Models and Strategies</text>
  
  <!-- Legend -->
  <rect x="550" y="70" width="15" height="15" fill="#4CAF50"/>
  <text x="570" y="82" font-size="11" fill="#333">Pass@1</text>
  <rect x="550" y="90" width="15" height="15" fill="#2196F3"/>
  <text x="570" y="102" font-size="11" fill="#333">Q/C Ratio (×10)</text>
  
  <!-- Y-axis -->
  <line x1="80" y1="100" x2="80" y2="400" stroke="#333" stroke-width="2"/>
  <text x="30" y="250" text-anchor="middle" font-size="12" fill="#333" transform="rotate(-90, 30, 250)">Score</text>
  
  <!-- X-axis -->
  <line x1="80" y1="400" x2="750" y2="400" stroke="#333" stroke-width="2"/>
  
  <!-- Grid lines -->
  <line x1="80" y1="340" x2="750" y2="340" stroke="#ddd" stroke-dasharray="5,5"/>
  <line x1="80" y1="280" x2="750" y2="280" stroke="#ddd" stroke-dasharray="5,5"/>
  <line x1="80" y1="220" x2="750" y2="220" stroke="#ddd" stroke-dasharray="5,5"/>
  <line x1="80" y1="160" x2="750" y2="160" stroke="#ddd" stroke-dasharray="5,5"/>
  <line x1="80" y1="100" x2="750" y2="100" stroke="#ddd" stroke-dasharray="5,5"/>
  
  <!-- Y-axis labels -->
  <text x="70" y="405" text-anchor="end" font-size="10" fill="#666">0.0</text>
  <text x="70" y="345" text-anchor="end" font-size="10" fill="#666">0.2</text>
  <text x="70" y="285" text-anchor="end" font-size="10" fill="#666">0.4</text>
  <text x="70" y="225" text-anchor="end" font-size="10" fill="#666">0.6</text>
  <text x="70" y="165" text-anchor="end" font-size="10" fill="#666">0.8</text>
  <text x="70" y="105" text-anchor="end" font-size="10" fill="#666">1.0</text>
  
  <!-- GPT-4o bars -->
  <g transform="translate(0, 0)">
    <text x="140" y="420" text-anchor="middle" font-size="11" fill="#333">GPT-4o</text>
    <!-- zero_shot -->
    <rect x="95" y="244" width="12" height="156" fill="#4CAF50" opacity="0.8"/>
    <rect x="107" y="373" width="12" height="27" fill="#2196F3" opacity="0.8"/>
    <!-- few_shot -->
    <rect x="115" y="217" width="12" height="183" fill="#4CAF50" opacity="0.8"/>
    <rect x="127" y="389" width="12" height="11" fill="#2196F3" opacity="0.8"/>
    <!-- cot -->
    <rect x="135" y="196" width="12" height="204" fill="#4CAF50" opacity="0.8"/>
    <rect x="147" y="393" width="12" height="7" fill="#2196F3" opacity="0.8"/>
    <!-- CAPE -->
    <rect x="155" y="226" width="12" height="174" fill="#FF9800" opacity="0.9"/>
    <rect x="167" y="386" width="12" height="14" fill="#FF9800" opacity="0.9"/>
  </g>
  
  <!-- CodeLlama bars -->
  <g transform="translate(0, 0)">
    <text x="340" y="420" text-anchor="middle" font-size="11" fill="#333">CodeLlama</text>
    <!-- zero_shot -->
    <rect x="295" y="268" width="12" height="132" fill="#4CAF50" opacity="0.8"/>
    <rect x="307" y="377" width="12" height="23" fill="#2196F3" opacity="0.8"/>
    <!-- few_shot -->
    <rect x="315" y="244" width="12" height="156" fill="#4CAF50" opacity="0.8"/>
    <rect x="327" y="391" width="12" height="9" fill="#2196F3" opacity="0.8"/>
    <!-- cot -->
    <rect x="335" y="226" width="12" height="174" fill="#4CAF50" opacity="0.8"/>
    <rect x="347" y="394" width="12" height="6" fill="#2196F3" opacity="0.8"/>
    <!-- CAPE -->
    <rect x="355" y="247" width="12" height="153" fill="#FF9800" opacity="0.9"/>
    <rect x="367" y="388" width="12" height="12" fill="#FF9800" opacity="0.9"/>
  </g>
  
  <!-- Claude bars -->
  <g transform="translate(0, 0)">
    <text x="540" y="420" text-anchor="middle" font-size="11" fill="#333">Claude-3.5</text>
    <!-- zero_shot -->
    <rect x="495" y="253" width="12" height="147" fill="#4CAF50" opacity="0.8"/>
    <rect x="507" y="375" width="12" height="25" fill="#2196F3" opacity="0.8"/>
    <!-- few_shot -->
    <rect x="515" y="226" width="12" height="174" fill="#4CAF50" opacity="0.8"/>
    <rect x="527" y="390" width="12" height="10" fill="#2196F3" opacity="0.8"/>
    <!-- cot -->
    <rect x="535" y="205" width="12" height="195" fill="#4CAF50" opacity="0.8"/>
    <rect x="547" y="393" width="12" height="7" fill="#2196F3" opacity="0.8"/>
    <!-- CAPE -->
    <rect x="555" y="235" width="12" height="165" fill="#FF9800" opacity="0.9"/>
    <rect x="567" y="387" width="12" height="13" fill="#FF9800" opacity="0.9"/>
  </g>
  
  <!-- Strategy labels -->
  <text x="200" y="445" text-anchor="middle" font-size="10" fill="#666">zs fs cot CAPE</text>
  <text x="400" y="445" text-anchor="middle" font-size="10" fill="#666">zs fs cot CAPE</text>
  <text x="600" y="445" text-anchor="middle" font-size="10" fill="#666">zs fs cot CAPE</text>
  
  <!-- Key findings box -->
  <rect x="550" y="120" width="220" height="100" fill="#fff" stroke="#ddd" stroke-width="1" rx="5"/>
  <text x="560" y="140" font-size="11" font-weight="bold" fill="#333">Key Findings:</text>
  <text x="560" y="158" font-size="10" fill="#666">• CAPE improves Q/C by 29-93%</text>
  <text x="560" y="173" font-size="10" fill="#666">• Token savings: 40-60%</text>
  <text x="560" y="188" font-size="10" fill="#666">• Maintains 95%+ of CoT quality</text>
  <text x="560" y="203" font-size="10" fill="#666">• Adaptive strategy selection</text>
</svg>
